<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumak</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <div class="app-shell">
      <aside class="sidebar" aria-label="历史记录">
        <div class="brand">
          <img class="brand-mark" src="./assets/lumak-logo.png" alt="" aria-hidden="true" />
          <div>
            <strong>Lumak</strong>
            <span>AI code workspace</span>
          </div>
        </div>

        <section class="sidebar-section conversations" aria-labelledby="conversation-title">
          <div class="section-heading">
            <h2 id="conversation-title">历史对话</h2>
            <div class="section-actions">
              <button class="icon-button" id="clearConversationsButton" type="button" aria-label="清空历史">⌫</button>
              <button class="icon-button" id="newConversationButton" type="button" aria-label="新建对话">+</button>
            </div>
          </div>
          <nav class="history-list" id="conversationList" aria-label="历史对话列表">
          </nav>
        </section>

        <section class="sidebar-section projects" aria-labelledby="project-title">
          <div class="section-heading">
            <h2 id="project-title">历史项目</h2>
            <button class="icon-button" id="addProjectButton" type="button" aria-label="添加项目">+</button>
          </div>
          <nav class="history-list" id="projectList" aria-label="历史项目列表">
          </nav>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Your branded coding AI</p>
            <h1>Lumak</h1>
            <div class="context-strip" aria-label="当前项目状态">
              <span>Lumak / Runtime</span>
              <span id="sessionState">New session</span>
              <span>WebSocket gateway</span>
            </div>
            <p class="header-copy">上传文件、截图或直接提问，让 Agent 帮你理解和修改当前项目。</p>
          </div>
          <div class="header-actions">
            <span class="status-pill" id="gatewayState">Gateway connecting</span>
            <button class="ghost-button" id="openProviderDialog" type="button">模型设置</button>
            <button class="ghost-button" id="openDetailsButton" type="button">运行详情</button>
            <button class="ghost-button" id="exportConversationButton" type="button">导出</button>
          </div>
        </header>

        <section class="messages" aria-label="对话内容">
          <article class="message assistant">
            <img class="avatar" src="./assets/lumak-logo.png" alt="" aria-hidden="true" />
            <div class="bubble">
              <p>你好，我可以读取项目结构、定位代码、解释模块关系，也可以帮你做小范围修改。</p>
            </div>
          </article>
        </section>

        <form class="composer" aria-label="发送消息">
          <div class="attachment-row" id="attachmentRow" hidden></div>
          <div class="composer-box">
            <label class="upload-button" for="fileInput" aria-label="上传图片或文件">
              <span aria-hidden="true">↑</span>
            </label>
            <textarea id="promptInput" rows="1" placeholder="输入问题，或上传图片 / 文件..." aria-label="输入消息"></textarea>
            <select class="model-select" id="modelSelect" name="model" aria-label="选择模型"></select>
            <button class="send-button" type="submit" aria-label="发送消息">
              <span aria-hidden="true">→</span>
            </button>
          </div>
          <input id="fileInput" type="file" accept="image/*,.pdf,.doc,.docx,.txt,.md,.zip" multiple />
        </form>
      </main>
    </div>

    <dialog class="provider-dialog" id="providerDialog">
      <form class="provider-panel" id="providerForm" method="dialog" aria-label="模型提供商配置">
        <div class="dialog-heading">
          <div>
            <p class="eyebrow">Provider setup</p>
            <h2>模型提供商</h2>
          </div>
          <button class="dialog-close" id="closeProviderDialog" type="button" aria-label="关闭">×</button>
        </div>

        <p class="provider-state" id="providerState">未配置</p>

        <label class="field">
          <span>提供商</span>
          <select id="providerSelect" name="provider">
            <option value="minimax">MiniMax</option>
            <option value="anthropic">Anthropic</option>
            <option value="openai">OpenAI</option>
            <option value="deepseek">DeepSeek</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <label class="field">
          <span>API Key</span>
          <input id="apiKeyInput" name="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
        </label>

        <label class="field">
          <span>Base URL（MiniMax / Custom 必填，其他可选）</span>
          <input id="baseUrlInput" name="baseUrl" type="url" placeholder="https://api.example.com/v1" autocomplete="off" />
        </label>

        <label class="field custom-model-field" id="customModelField" hidden>
          <span>自定义模型</span>
          <input id="customModelInput" name="customModel" type="text" placeholder="输入模型名称，例如 my-model" />
        </label>

        <button class="provider-submit" type="submit">保存配置</button>
      </form>
    </dialog>

    <dialog class="details-dialog" id="detailsDialog">
      <section class="details-panel" aria-label="运行详情">
        <div class="dialog-heading">
          <div>
            <p class="eyebrow">Runtime details</p>
            <h2>运行详情</h2>
          </div>
          <button class="dialog-close" id="closeDetailsDialog" type="button" aria-label="关闭">×</button>
        </div>
        <div class="details-actions">
          <button class="ghost-button" id="refreshDetailsButton" type="button">刷新</button>
          <span class="provider-state" id="detailsState">等待加载</span>
        </div>
        <pre class="details-output" id="detailsOutput">暂无数据</pre>
      </section>
    </dialog>

    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
